<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script href="js/script.js"></script>
    <title>URLinker</title>
</head>
<body class="body">
<div class="main">
    <div class="main_box">
        <h1 class="main_box_title">URLinker</h1>
        <div class="main_box_cutter">
            <div class="main_box_cutter_title">
                <p class="main_box_cutter_title_text">The Simplest URL Shortner for you</p>
            </div>
            <div class="main_box_cutter_link-additional">
                <div class="main_box_cutter_link-paste">
                    <img src="images/link.svg" alt="Huinya ebanaya">
                    <input class="main_box_cutter_link-paste-field" id="longUrl" type="text" placeholder="Enter your link here...">
                </div>
                <button class="main_box_cutter_link-paste-btn" id="submitBtn" type="submit"><img src="images/submit.svg" alt="Huinya ebanaya 2"></button>
            </div>
            <div class="main_box_cutter_link-additional-two">
                <div class="main_box_cutter_link-generated">
                    <input class="main_box_cutter_link-generated-field" id="shortUrl" type="text" placeholder="...">
                </div>
                <button class="main_box_cutter_link-generated-btn" id="copyBtn"><img class="main_box_cutter_link-generated-btn-image" src="images/copy.svg" alt="Huinya ebanaya 2">Copy Link</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
